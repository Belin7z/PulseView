<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relógio Ultimate 3D</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      transition: background 2s ease;
      overflow: hidden;
      color: white;
    }

    /* Canvas para Partículas */
    #particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 1;
      perspective: 2000px;
    }

    h1 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 10px;
      margin-bottom: 2.5rem;
      opacity: 0.5;
      font-weight: 300;
    }

    /* O Cartão 3D */
    #clock-card {
      position: relative;
      padding: 60px 90px;
      border-radius: 40px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transform-style: preserve-3d;
      transition: box-shadow 0.3s ease;
    }

    /* Reflexo Dinâmico */
    #clock-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 40px;
      background: radial-gradient(circle at var(--m-x) var(--m-y), rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    #clock-card:hover::before { opacity: 1; }

    #hora {
      font-size: 6rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }

    #data {
      font-size: 1.2rem;
      opacity: 0.7;
      font-weight: 300;
      letter-spacing: 1px;
    }

    /* Botão Fullscreen */
    .fs-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 10px 15px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.3s;
      z-index: 10;
    }
    .fs-btn:hover { background: rgba(255,255,255,0.2); }

    @media (max-width: 600px) {
      #hora { font-size: 3.5rem; }
      #clock-card { padding: 40px 30px; margin: 20px; }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="container">
    <h1>Chronos System</h1>
    <div id="clock-card" title="Clique para mudar formato">
      <div id="hora">00:00:00</div>
      <div id="data">---</div>
    </div>
  </div>

  <button class="fs-btn" onclick="toggleFS()">TELA CHEIA</button>

  <script>
    const card = document.getElementById('clock-card');
    const horaEl = document.getElementById('hora');
    const dataEl = document.getElementById('data');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    let is24h = true;
    let tX = 0, tY = 0, cX = 0, cY = 0;

    // 1. Relógio e Data
    function update() {
      const now = new Date();
      horaEl.textContent = now.toLocaleTimeString('pt-BR', { hour12: !is24h });
      dataEl.textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
      
      // Mudar cores conforme a hora
      const h = now.getHours();
      let color = "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)"; // Noite
      if(h >= 5 && h < 12) color = "linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%)"; // Manhã
      if(h >= 12 && h < 18) color = "linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)"; // Tarde
      document.body.style.background = color;
    }

    // 2. Movimento 3D e Brilho
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      card.style.setProperty('--m-x', `${x}px`);
      card.style.setProperty('--m-y', `${y}px`);
      tX = (y - r.height/2) / 10;
      tY = (x - r.width/2) / 15;
    });

    card.addEventListener('mouseleave', () => { tX = 0; tY = 0; });
    card.addEventListener('click', () => { is24h = !is24h; update(); });

    function animate() {
      cX += (tX - cX) * 0.1;
      cY += (tY - cY) * 0.1;
      card.style.transform = `rotateX(${-cX}deg) rotateY(${cY}deg)`;
      drawParticles();
      requestAnimationFrame(animate);
    }

    // 3. Sistema de Partículas (Background Vivo)
    let dots = [];
    function initParticles() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      dots = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        v: Math.random() * 0.5 + 0.1,
        s: Math.random() * 2
      }));
    }

    function drawParticles() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      dots.forEach(d => {
        d.y -= d.v;
        if(d.y < 0) d.y = canvas.height;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.s, 0, Math.PI*2);
        ctx.fill();
      });
    }

    function toggleFS() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }

    window.addEventListener('resize', initParticles);
    initParticles();
    setInterval(update, 1000);
    update();
    animate();
  </script>
</body>
</html>
