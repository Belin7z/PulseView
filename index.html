<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Belin7z</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purple-dark: #1a0033;
            --purple-main: #6b2d8f;
            --purple-light: #9b59b6;
            --purple-glow: #b388ff;
            --black: #0a0a0a;
            --white: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, var(--purple-dark) 50%, var(--black) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Partículas animadas de fundo */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: var(--purple-glow);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px;
            background: rgba(10, 10, 10, 0.7);
            border: 2px solid var(--purple-main);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(155, 89, 182, 0.4),
                inset 0 0 40px rgba(155, 89, 182, 0.1);
            max-width: 800px;
            transition: all 0.4s ease;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 
                0 0 100px rgba(155, 89, 182, 0.6),
                inset 0 0 60px rgba(155, 89, 182, 0.2);
        }

        /* Título Hello World */
        h1 {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--white) 0%, var(--purple-glow) 50%, var(--purple-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(155, 89, 182, 0.5);
            animation: glow 3s ease-in-out infinite;
            letter-spacing: -5px;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(155, 89, 182, 0.8)); }
            50% { filter: drop-shadow(0 0 40px rgba(179, 136, 255, 1)); }
        }

        /* Subtítulo */
        .subtitle {
            color: var(--purple-glow);
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Linha decorativa */
        .line {
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple-light), transparent);
            margin: 30px auto;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.1); }
        }

        /* Descrição */
        .description {
            color: var(--white);
            font-size: 1.1rem;
            font-weight: 300;
            margin: 20px 0;
            line-height: 1.8;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Marca d'água */
        .watermark {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: right;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .watermark:hover {
            color: var(--purple-glow);
            transform: scale(1.05);
        }

        .watermark .name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--white);
            display: block;
            margin-bottom: 5px;
        }

        .watermark .by {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Botão interativo */
        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--purple-light);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--purple-glow), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: var(--purple-main);
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.8);
            transform: translateY(-3px);
        }

        /* Responsivo */
        @media (max-width: 768px) {
            h1 {
                font-size: 4rem;
                letter-spacing: -2px;
            }
            .container {
                padding: 40px 30px;
                margin: 20px;
            }
            .subtitle {
                font-size: 1rem;
            }
            .description {
                font-size: 0.9rem;
            }
            .watermark {
                bottom: 20px;
                right: 20px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fundo -->
    <div class="particles" id="particles"></div>

    <!-- Container principal -->
    <div class="container">
        <h1>HELLO<br>WORLD</h1>
        <div class="subtitle">Bem-vindo ao futuro</div>
        <div class="line"></div>
        <p class="description">
            Uma página profissional criada com design moderno,<br>
            elegante e minimalista em roxo, preto e branco.
        </p>
        <button class="btn" onclick="changeColor()">Explorar</button>
    </div>

    <!-- Marca d'água -->
    <div class="watermark">
        <span class="name">Belin7z</span>
        <span class="by">Jefferson Alves</span>
    </div>

    <script>
        // Criar partículas
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 5 + 2;
                const startX = Math.random() * 100;
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${startX}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;

                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        // Função do botão
        function changeColor() {
            const container = document.querySelector('.container');
            container.style.borderColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            
            // Efeito de feedback
            const btn = document.querySelector('.btn');
            btn.textContent = 'Incrível!';
            setTimeout(() => {
                btn.textContent = 'Explorar';
            }, 1000);
        }

        // Efeito parallax suave no mouse
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.container');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            container.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
