<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relógio Imersivo 3D</title>
  <!-- Fonte Moderna -->
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  
  <style>
    :root {
      /* Cores dinâmicas que podem ser alteradas via JS */
      --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent-color: #00d2ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      transition: background 2s ease; /* Transição suave de cores por horário */
      overflow: hidden;
      color: white;
    }

    .container {
      text-align: center;
      perspective: 1500px;
    }

    h1 {
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 8px;
      margin-bottom: 2rem;
      opacity: 0.6;
      font-weight: 300;
      animation: fadeIn 1.5s ease-out;
    }

    /* O Cartão do Relógio */
    #clock-card {
      position: relative;
      padding: 50px 80px;
      border-radius: 30px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transform-style: preserve-3d;
      transition: box-shadow 0.3s ease;
    }

    /* Brilho que segue o mouse */
    #clock-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 30px;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.15) 0%, transparent 80%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    #clock-card:hover::before {
      opacity: 1;
    }

    #hora {
      font-size: 5rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      display: block;
      margin-bottom: 10px;
      text-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #data {
      font-size: 1.1rem;
      opacity: 0.8;
      letter-spacing: 2px;
    }

    /* Badge de Formato (12h/24h) */
    .format-badge {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 0.6; transform: translateY(0); }
    }

    /* Responsividade básica */
    @media (max-width: 600px) {
      #hora { font-size: 3rem; }
      #clock-card { padding: 30px 40px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>System Time</h1>
    
    <div id="clock-card">
      <span class="format-badge" id="formatIndicator">24H</span>
      <div id="hora" aria-live="polite">00:00:00</div>
      <div id="data">carregando data...</div>
    </div>
  </div>

  <script>
    const card = document.getElementById('clock-card');
    const horaEl = document.getElementById('hora');
    const dataEl = document.getElementById('data');
    const formatBadge = document.getElementById('formatIndicator');
    
    let is24h = true;
    let targetRotateX = 0, targetRotateY = 0;
    let currentRotateX = 0, currentRotateY = 0;

    // 1. Atualizar Relógio e Data
    function updateClock() {
      const now = new Date();
      
      // Formato da Hora
      const optionsTime = { 
        hour: '2-digit', minute: '2-digit', second: '2-digit', 
        hour12: !is24h 
      };
      horaEl.textContent = now.toLocaleTimeString('pt-BR', optionsTime);

      // Formato da Data
      const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      dataEl.textContent = now.toLocaleDateString('pt-BR', optionsDate);

      updateBackground(now.getHours());
    }

    // 2. Mudar Fundo baseado na Hora do Dia
    function updateBackground(hour) {
      let gradient = "";
      if (hour >= 5 && hour < 12) { // Manhã
        gradient = "linear-gradient(135deg, #FF9A8B 0%, #FF6A88 55%, #FF99AC 100%)";
      } else if (hour >= 12 && hour < 18) { // Tarde
        gradient = "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)";
      } else { // Noite
        gradient = "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)";
      }
      document.body.style.background = gradient;
    }

    // 3. Efeito de Inclinação (Tilt) e Brilho (Spotlight)
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // Define posição do brilho para o CSS
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);

      // Cálculos para rotação
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      targetRotateX = (y - centerY) / 10; 
      targetRotateY = (x - centerX) / 15;
    });

    card.addEventListener('mouseleave', () => {
      targetRotateX = 0;
      targetRotateY = 0;
    });

    // 4. Alternar Formato 12h/24h ao clicar
    card.addEventListener('click', () => {
      is24h = !is24h;
      formatBadge.textContent = is24h ? "24H" : "12H";
      updateClock();
    });

    // Loop de Animação Suave (Lerp)
    function animate() {
      currentRotateX += (targetRotateX - currentRotateX) * 0.1;
      currentRotateY += (targetRotateY - currentRotateY) * 0.1;

      card.style.transform = `rotateX(${-currentRotateX}deg) rotateY(${currentRotateY}deg)`;
      requestAnimationFrame(animate);
    }

    // Início
    setInterval(updateClock, 1000);
    updateClock();
    animate();
  </script>
</body>
</html>
