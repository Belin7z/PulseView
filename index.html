<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 3.5rem;
      color: white;
      margin-bottom: 3rem;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
      font-weight: 700;
      animation: fadeInDown 0.8s ease-out;
    }

    #hora {
      font-size: 4rem;
      color: #ffffff;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      display: inline-block;
      padding: 30px 60px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      transition: all 0.1s ease-out;
      will-change: transform;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      letter-spacing: 3px;
    }

    #hora:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 48px 0 rgba(31, 38, 135, 0.45);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <h1>Hello World!</h1>
  <p id="hora"></p>

  <script>
    const horaElement = document.getElementById('hora');
    let mouseX = 0;
    let mouseY = 0;
    let targetRotateX = 0;
    let targetRotateY = 0;
    let currentRotateX = 0;
    let currentRotateY = 0;

    function atualizarHora() {
      const agora = new Date();
      horaElement.textContent = agora.toLocaleTimeString('pt-BR');
    }

    function animateTransform() {
      currentRotateX += (targetRotateX - currentRotateX) * 0.1;
      currentRotateY += (targetRotateY - currentRotateY) * 0.1;
      
      const scale = 1 + (Math.abs(currentRotateX) + Math.abs(currentRotateY)) / 200;
      horaElement.style.transform = `perspective(1200px) rotateX(${-currentRotateX}deg) rotateY(${currentRotateY}deg) scale(${Math.min(scale, 1.1)})`;
      
      requestAnimationFrame(animateTransform);
    }

    horaElement.addEventListener('mousemove', function(event) {
      const rect = horaElement.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      mouseX = event.clientX - centerX;
      mouseY = event.clientY - centerY;
      
      targetRotateX = (mouseY / rect.height) * 25;
      targetRotateY = (mouseX / rect.width) * 25;
    });

    horaElement.addEventListener('mouseleave', function() {
      targetRotateX = 0;
      targetRotateY = 0;
    });

    // Iniciar animação
    animateTransform();
    atualizarHora();
    setInterval(atualizarHora, 1000);
  </script>
</body>
</html>
