<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    h1 {
      font-size: 4rem;
      color: white;
      margin-bottom: 2rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    #hora {
      font-size: 3rem;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      font-family: 'Courier New', monospace;
      cursor: pointer;
      perspective: 1000px;
      transition: transform 0.1s ease-out;
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #hora:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
  </style>
</head>
<body>
  <h1>Hello World!</h1>
  <p id="hora"></p>

  <script>
    function atualizarHora() {
      const agora = new Date();
      document.getElementById('hora').textContent = agora.toLocaleTimeString('pt-BR');
    }

    // Função para efeito 3D parallax
    const horaElement = document.getElementById('hora');
    horaElement.addEventListener('mousemove', function(event) {
      const rect = horaElement.getBoundingClientRect();
      const x = event.clientX - rect.left - rect.width / 2;
      const y = event.clientY - rect.top - rect.height / 2;
      
      const rotateX = (y / rect.height) * 20;
      const rotateY = (x / rect.width) * 20;
      
      horaElement.style.transform = `perspective(1000px) rotateX(${-rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
    });

    horaElement.addEventListener('mouseleave', function() {
      horaElement.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
    });

    atualizarHora();
    setInterval(atualizarHora, 1000);
  </script>
</body>
</html>
